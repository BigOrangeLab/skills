name: Markdown checks

on:
    pull_request:
    push:
        branches:
            - main

jobs:
    markdown:
        runs-on: ubuntu-latest

        steps:
            - uses: actions/checkout@v4

            - uses: actions/setup-node@v4
              with:
                  node-version: "20"
                  cache: "npm"

            - name: Install dependencies
              run: npm ci

            - name: Check markdown formatting and lint
              run: npm run lint
